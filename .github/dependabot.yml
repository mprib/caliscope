version: 2
updates:
  # Python dependencies (uv lockfile)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk bumps into a single monthly PR that can be tested once.
      # Major bumps are excluded so they arrive as separate, isolated PRs.
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions:
        patterns:
          - "*"
